<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Clustering App</title>
    <link rel="stylesheet" href="static/css/style.min.css">
</head>
<body>

<header>
<div class="container">
    <div class="row">
<div class="col-6">
    <a href="#" class="logo">
        <img src="static/logo.png" alt="">
    </a>
</div>
</div>
</div>
</header>
  <div id="loading-overlay" style="display:none; ">
            <div id="errorIcon"  ><img id="danger" src="static/danger.svg" alt=""></div>
            <img id="preloader" src="static/preloader.gif" alt="">
            <div id="progressContainer"></div>

            <div id="errorContainer">
                <div id="errorMsg"  ></div>
                <a href="." id="refresh">Try again</a>
            </div>
            
            
        </div>
<section class="hero">
    <div class="container">
        <strong>Customer Classification Model v3.0</strong>
        <h1>Unleash the Power of AI.<br>Smarter, Faster, Better</h1>
        <!-- <p>Transform your business with cutting-edge AI.  </p> -->
        <p>Upload your dataset. We will auto-tune the parameters.</p>
    </div>
    <div class="cta">
  <div class="container">
        <!-- <strong>Step 1: Auto-Training</strong>
        <h2>Train Model</h2> -->
    </div>
    
    <div class="container" style="max-width: 600px;">
        <div class="card">
          
            
            <form id="trainForm" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <button class="primary-btn"  type="button" id="btnTrain">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M9 17V11L7 13" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
<path d="M9 11L11 13" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
<path d="M22 10V15C22 20 20 22 15 22H9C4 22 2 20 2 15V9C2 4 4 2 9 2H14" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
<path d="M22 10H18C15 10 14 9 14 6V2L22 10Z" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
Upload dataset</button>
                    <input type="file" id="trainFile" accept=".csv" required name="file"  style="display: none;">
                </div>
                
            
                
            </form>
            

        </div>
    </div>
    </div>
    
</section>

    <script src="static/js/jquery-3.6.0.min.js"></script>
<script>
     $(document).ready(function() {
            $('#btnTrain').on('click', function() {
                $('#trainFile').click();
            });

            $('#trainFile').on('change', function() {
                $('#trainForm').submit();
            });
        });

           $('#trainForm').on('submit', async function(e) {
           e.preventDefault();
    $('.hero,header').css('filter', 'blur(8px)');
 
            const errorDiv = document.getElementById('errorMsg');
            const errorContainer = document.getElementById('errorContainer');
            const loader = document.getElementById('loading-overlay');
            const errorIcon = document.getElementById('errorIcon');
            const preloaderIcon = document.getElementById('preloader');
            const progressContainer = document.getElementById('progressContainer');
            
            const newString = "Training in progress... This may take a few minutes.";
            progressContainer.textContent = newString;
 
            loader.style.display = 'block';
            errorDiv.style.display = 'none';
            errorContainer.style.display = 'none';
            errorIcon.style.display = 'none';
            preloaderIcon.style.display = 'block';

            const fileInput = document.getElementById('trainFile');
            const btnTrain = document.getElementById('btnTrain');
  

            

 
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {   
                // FIX: Use 'upload' (relative) instead of '/upload' (absolute)
                const response = await fetch('api/train', {
                    method: 'POST',
                    body: formData
                });

                // Read text first to catch HTML errors (like 404/500)
                const responseText = await response.text();
                
                 let result;
                try {
                    result = JSON.parse(responseText);
                } catch (err) {
                     
                    console.error("Server HTML Response:", responseText);
                    throw new Error(`Server returned error (${response.status}). See console.`);
                }

                if (!response.ok || result.error) {
                  
                    throw new Error(result.error || "Unknown Server Error");
                }

                //   $('main,header').css('filter', 'none');
                sessionStorage.setItem('dqResult', JSON.stringify(result));
                window.location.href = "result?success=true"; // Relative redirect

            } catch (err) {
 
                console.log(err.message);
 
            }
    });
</script>

</body>
</html>
